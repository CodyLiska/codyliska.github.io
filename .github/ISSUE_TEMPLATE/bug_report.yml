name: Bug report
description: Report something that isn't working
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you expect to happen instead?
      placeholder: Tell us what you saw...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact steps so we can reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, versions, and anything else relevant.
      placeholder: "macOS 14.5, Node 20.11, etc."
    validations:
      required: false
