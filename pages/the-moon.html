<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* Style the Image Used to Trigger the Modal */
      .myImg {
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }

      .myImg:hover {
        opacity: 0.7;
      }

      /* The Modal (background) */
      .modal {
        display: none; /* Hidden by default */
        position: fixed; /* Stay in place */
        z-index: 1; /* Sit on top */
        padding-top: 100px; /* Location of the box */
        left: 0;
        top: 0;
        width: 100%; /* Full width */
        height: 100%; /* Full height */
        overflow: auto; /* Enable scroll if needed */
        background-color: rgb(0, 0, 0); /* Fallback color */
        background-color: rgba(0, 0, 0, 0.9); /* Black w/ opacity */
      }

      /* Modal Content (Image) */
      .modal-content {
        margin: auto;
        display: block;
        width: 80%;
        max-width: 700px;
      }

      /* Caption of Modal Image (Image Text) - Same Width as the Image */
      #caption {
        margin: auto;
        display: block;
        width: 80%;
        max-width: 700px;
        text-align: center;
        color: #ccc;
        padding: 10px 0;
        height: 150px;
      }

      /* Add Animation - Zoom in the Modal */
      .modal-content,
      #caption {
        animation-name: zoom;
        animation-duration: 0.6s;
      }

      @keyframes zoom {
        from {
          transform: scale(0);
        }
        to {
          transform: scale(1);
        }
      }

      /* The Close Button */
      .close {
        position: absolute;
        top: 15px;
        right: 35px;
        color: #f1f1f1;
        font-size: 40px;
        font-weight: bold;
        transition: 0.3s;
      }

      .close:hover,
      .close:focus {
        color: #bbb;
        text-decoration: none;
        cursor: pointer;
      }

      /* 100% Image Width on Smaller Screens */
      @media only screen and (max-width: 700px) {
        .modal-content {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <img
      class="myImg"
      src="/img/gallery-moon/crescent_moon.png"
      alt=""
      style="width: 100%; max-width: 300px; max-height: 450px;"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0299.jpg"
      alt="moon 1"
      style="width: 100%; max-width: 300px;"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/moon_mars.JPEG"
      alt="moon 2"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/the_moon.jpg"
      alt="moon 3"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0233.jpg"
      alt="moon 4"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0309.jpg"
      alt="moon 5"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0689.jpg"
      alt="moon 6"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0716.jpg"
      alt="moon 7"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0718.jpg"
      alt="moon 8"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0721.jpg"
      alt="moon 9"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_0787.jpg"
      alt="moon 10"
      style="width: 100%; max-width: 300px"
    />
    <img
      class="myImg"
      src="/img/gallery-moon/IMG_1280.jpg"
      alt="moon 11"
      style="width: 100%; max-width: 300px"
    />

    <!-- The Modal -->
    <div id="myModal" class="modal">
      <span class="close">&times;</span>
      <img class="modal-content" id="img01" />
      <div id="caption"></div>
    </div>

    <script>
      // Get the modal
      var modal = document.getElementById("myModal");

      // Get the images and bind the click event
      var images = document.getElementsByClassName("myImg");
      var modalImg = document.getElementById("img01");
      var captionText = document.getElementById("caption");

      for (var i = 0; i < images.length; i++) {
        images[i].onclick = function () {
          modal.style.display = "block";
          modalImg.src = this.src;
          captionText.textContent = this.alt;
        };
      }

      // Get the <span> element that closes the modal
      var span = document.getElementsByClassName("close")[0];

      // When the user clicks on <span> (x), close the modal
      span.onclick = function () {
        modal.style.display = "none";
      };
    </script>
  </body>
</html>
