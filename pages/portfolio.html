<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Album</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .album-header {
      text-align: center;
      margin: 20px 0;
    }
    .album-photo {
      margin-bottom: 20px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .album-photo img {
      width: 100%;
      height: auto;
      transition: transform 0.3s;
      cursor: pointer;
    }
    .album-photo img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">PhotoAlbum</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item active">
        <a class="nav-link" href="#">Home <span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Gallery</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Contact</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container">
  <div class="album-header">
    <h1>My Photography Album</h1>
    <p class="lead">A collection of my favorite photographs.</p>
  </div>

  <div class="row">
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 1" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 2" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 3" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 4" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 5" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
    <div class="col-lg-4 col-md-6">
      <div class="album-photo">
        <img src="https://via.placeholder.com/400x300" alt="Photo 6" data-toggle="modal" data-target="#photoModal" data-src="https://via.placeholder.com/1200x900">
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="photoModal" tabindex="-1" aria-labelledby="photoModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="photoModalLabel">Photo</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <img src="" alt="Enlarged Photo" class="img-fluid" id="modalImage">
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
  $('#photoModal').on('show.bs.modal', function (event) {
    var button = $(event.relatedTarget);
    var src = button.data('src');
    var modal = $(this);
    modal.find('#modalImage').attr('src', src);
  });
</script>
</body>
</html>
